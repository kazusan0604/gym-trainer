<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジムメニュー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        h3 {
            color: #555;
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            width: 100%;
            background-color: #667eea;
            color: white;
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            width: 100%;
            background-color: #17a2b8;
            color: white;
            margin-bottom: 20px;
        }

        .btn-secondary:hover {
            background-color: #138496;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.4);
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 10px;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .btn-warning {
            background-color: #ffc107;
            color: #333;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 5px;
        }

        .btn-warning:hover {
            background-color: #e0a800;
        }

        .btn-reset {
            width: 100%;
            background-color: #6c757d;
            color: white;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background-color: #5a6268;
        }

        .btn-timer {
            background-color: #28a745;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
        }

        .btn-timer:hover {
            background-color: #218838;
        }

        .btn-timer-edit {
            background-color: #17a2b8;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 5px;
        }

        .btn-timer-edit:hover {
            background-color: #138496;
        }

        .btn-category {
            padding: 10px 20px;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
            background-color: #e9ecef;
            color: #333;
            border: 2px solid transparent;
            border-radius: 5px;
        }

        .btn-category:hover {
            background-color: #dee2e6;
        }

        .btn-category.active {
            background-color: #667eea;
            color: white;
            border-color: #5568d3;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-add-category {
            padding: 10px 15px;
            font-size: 13px;
            background-color: #28a745;
            color: white;
            margin-bottom: 10px;
        }

        .btn-add-category:hover {
            background-color: #218838;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 5px;
            background-color: #f9f9f9;
            transition: all 0.3s;
        }

        li:hover {
            border-color: #667eea;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        li.done {
            background-color: #e8f5e9;
            border-color: #4caf50;
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            margin-right: 15px;
            cursor: pointer;
            width: auto;
        }

        .menu-content {
            flex: 1;
        }

        .menu-name {
            font-weight: bold;
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .menu-details {
            color: #666;
            font-size: 14px;
        }

        .done .menu-name,
        .done .menu-details {
            text-decoration: line-through;
            color: #888;
        }

        .menu-actions {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background-color: #f0f4ff;
            border-radius: 5px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
        }

        .stat-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        /* タイマーウィジェット */
        .timer-widget {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 25px;
            margin: 30px 0;
            color: white;
            text-align: center;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .timer-widget-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .timer-widget-name {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .timer-widget-display {
            font-size: 80px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin: 15px 0;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .timer-widget-display.warning {
            animation: pulse-warning 0.5s infinite;
        }

        .timer-widget-display.danger {
            animation: pulse-danger 0.3s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        @keyframes pulse-danger {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        .timer-widget-info {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .timer-progress {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress-fill {
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            transition: width 0.1s;
            border-radius: 3px;
        }

        .timer-preset-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .timer-preset-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px;
            font-size: 11px;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .timer-preset-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .timer-preset-btn.active {
            background-color: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border-color: white;
        }

        .timer-custom-input {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .timer-custom-input input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }

        .timer-custom-input button {
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .timer-custom-input button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .timer-control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .timer-control-btn {
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
        }

        .timer-control-btn.play {
            background-color: #28a745;
        }

        .timer-control-btn.play:hover {
            background-color: #218838;
        }

        .timer-control-btn.pause {
            background-color: #ff9800;
        }

        .timer-control-btn.pause:hover {
            background-color: #e68900;
        }

        .timer-control-btn.reset {
            background-color: #dc3545;
        }

        .timer-control-btn.reset:hover {
            background-color: #c82333;
        }

        .timer-widget.hidden {
            display: none;
        }

        .btn-delete-category {
            background-color: #dc3545;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            margin-left: 5px;
        }

        .btn-delete-category:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💪 ジムメニュー管理</h2>

        <!-- カテゴリ管理 -->
        <h3>📂 トレーニングカテゴリ</h3>
        <button class="btn-add-category" onclick="showAddCategoryModal()">+ 新しいカテゴリを追加</button>
        
        <div class="category-tabs" id="categoryTabs"></div>

        <!-- トレーニング追加 -->
        <h3 id="categoryTitle">トレーニング追加</h3>
        <div class="input-group">
            <input type="text" id="name" placeholder="種目名 (例: ベンチプレス)" required>
        </div>
        <div class="input-row">
            <input type="number" id="sets" placeholder="セット数" min="1" required>
            <input type="number" id="reps" placeholder="回数" min="1" required>
        </div>
        <button class="btn-primary" onclick="addMenu()">メニューに追加</button>

        <!-- タイマーウィジェット -->
        <div class="timer-widget hidden" id="timerWidget">
            <div class="timer-widget-title">⏱️ タイマー</div>
            <div class="timer-widget-name" id="timerWidgetName">タイマー</div>
            <div class="timer-widget-info" id="timerWidgetInfo">セット情報</div>
            <div class="timer-widget-display" id="timerWidgetDisplay">00:00</div>
            <div class="timer-progress">
                <div class="timer-progress-fill" id="timerWidgetProgress" style="width: 0%;"></div>
            </div>

            <div class="timer-preset-buttons">
                <button class="timer-preset-btn" onclick="setTimerPreset(30)">30秒</button>
                <button class="timer-preset-btn" onclick="setTimerPreset(60)">1分</button>
                <button class="timer-preset-btn" onclick="setTimerPreset(90)">1分30秒</button>
                <button class="timer-preset-btn" onclick="setTimerPreset(120)">2分</button>
            </div>

            <div class="timer-custom-input">
                <input type="number" id="timerCustomInput" min="1" max="600" value="60" placeholder="秒数">
                <button onclick="applyCustomTimer()">設定</button>
            </div>

            <div class="timer-control-buttons">
                <button class="timer-control-btn play" id="timerPlayBtn" onclick="startTimer()">開始</button>
                <button class="timer-control-btn pause" id="timerPauseBtn" onclick="pauseTimer()" style="display: none;">一時停止</button>
                <button class="timer-control-btn reset" onclick="resetTimer()">リセット</button>
            </div>
        </div>

        <h2>📋 本日のメニュー</h2>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">全体</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">完了</div>
                <div class="stat-value" id="doneCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">進捗</div>
                <div class="stat-value" id="progress">0%</div>
            </div>
        </div>
        <ul id="menuList"></ul>
        <button class="btn-reset" onclick="resetCurrentCategory()">このカテゴリをリセット</button>
    </div>

    <!-- カテゴリ追加モーダル -->
    <div id="categoryModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background-color: white; padding: 30px; border-radius: 10px; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
            <h3 style="margin-bottom: 20px; color: #333;">新しいカテゴリを追加</h3>
            <input type="text" id="categoryNameInput" placeholder="カテゴリ名 (例: 胸の日)" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px;">
            <div style="display: flex; gap: 10px;">
                <button onclick="addCategory()" style="flex: 1; padding: 12px; background-color: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">追加</button>
                <button onclick="closeAddCategoryModal()" style="flex: 1; padding: 12px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        let categories = JSON.parse(localStorage.getItem("gymCategories")) || [];
        let menu = JSON.parse(localStorage.getItem("gymMenu")) || {};
        let currentCategory = categories.length > 0 ? categories[0] : null;
        let timerInterval = null;
        let timerRunning = false;
        let timerSeconds = 0;
        let timerTotalSeconds = 0;
        let currentTimerIndex = -1;

        // 初期化
        if (categories.length === 0) {
            categories = ["胸の日", "背中の日", "足の日"];
            localStorage.setItem("gymCategories", JSON.stringify(categories));
            menu = {
                "胸の日": [],
                "背中の日": [],
                "足の日": []
            };
            localStorage.setItem("gymMenu", JSON.stringify(menu));
            currentCategory = categories[0];
        }

        function renderCategories() {
            const tabs = document.getElementById("categoryTabs");
            tabs.innerHTML = "";
            
            categories.forEach(category => {
                const btn = document.createElement("button");
                btn.className = "btn-category" + (category === currentCategory ? " active" : "");
                btn.innerHTML = `${category} <button class="btn-delete-category" onclick="deleteCategory('${category}'); event.stopPropagation();">×</button>`;
                btn.onclick = () => selectCategory(category);
                tabs.appendChild(btn);
            });
        }

        function selectCategory(category) {
            currentCategory = category;
            renderCategories();
            render();
            document.getElementById("categoryTitle").textContent = `${category} - トレーニング追加`;
        }

        function showAddCategoryModal() {
            document.getElementById("categoryModal").style.display = "flex";
            document.getElementById("categoryNameInput").value = "";
            document.getElementById("categoryNameInput").focus();
        }

        function closeAddCategoryModal() {
            document.getElementById("categoryModal").style.display = "none";
        }

        function addCategory() {
            const name = document.getElementById("categoryNameInput").value.trim();
            
            if (!name) {
                alert("カテゴリ名を入力してください");
                return;
            }

            if (categories.includes(name)) {
                alert("このカテゴリは既に存在します");
                return;
            }

            categories.push(name);
            if (!menu[name]) {
                menu[name] = [];
            }
            
            localStorage.setItem("gymCategories", JSON.stringify(categories));
            localStorage.setItem("gymMenu", JSON.stringify(menu));
            
            currentCategory = name;
            renderCategories();
            render();
            closeAddCategoryModal();
        }

        function deleteCategory(category) {
            if (confirm(`「${category}」を削除しますか？\n\nこの操作は取り消せません。`)) {
                categories = categories.filter(c => c !== category);
                delete menu[category];
                
                if (currentCategory === category) {
                    currentCategory = categories.length > 0 ? categories[0] : null;
                }
                
                localStorage.setItem("gymCategories", JSON.stringify(categories));
                localStorage.setItem("gymMenu", JSON.stringify(menu));
                
                renderCategories();
                render();
            }
        }

        function render() {
            if (!currentCategory) {
                document.getElementById("menuList").innerHTML = '<div class="empty-message">カテゴリを追加してください</div>';
                updateStats();
                return;
            }

            const list = document.getElementById("menuList");
            const currentMenu = menu[currentCategory] || [];
            
            list.innerHTML = "";

            if (currentMenu.length === 0) {
                list.innerHTML = '<div class="empty-message">トレーニングメニューを追加してください</div>';
                updateStats();
                return;
            }

            currentMenu.forEach((item, index) => {
                const li = document.createElement("li");
                const isChecked = item.done ? "checked" : "";
                const doneClass = item.done ? "done" : "";

                li.className = doneClass;
                li.innerHTML = `
                    <div style="display: flex; align-items: center; flex: 1;">
                        <input type="checkbox" ${isChecked} onchange="toggle(${index})">
                        <div class="menu-content">
                            <div class="menu-name">${escapeHtml(item.name)}</div>
                            <div class="menu-details">${item.sets}セット × ${item.reps}回</div>
                        </div>
                    </div>
                    <div class="menu-actions">
                        <button class="btn-timer" onclick="openTimer(${index})">⏱ ${item.rest || 60}秒</button>
                        <button class="btn-timer-edit" onclick="editRestTime(${index})">⏱ 編集</button>
                        <button class="btn-warning" onclick="editMenu(${index})">編集</button>
                        <button class="btn-danger" onclick="deleteMenu(${index})">削除</button>
                    </div>
                `;
                list.appendChild(li);
            });

            updateStats();
            saveData();
        }

        function updateStats() {
            if (!currentCategory) {
                document.getElementById("totalCount").textContent = 0;
                document.getElementById("doneCount").textContent = 0;
                document.getElementById("progress").textContent = "0%";
                return;
            }

            const currentMenu = menu[currentCategory] || [];
            const totalCount = currentMenu.length;
            const doneCount = currentMenu.filter(item => item.done).length;
            const progress = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

            document.getElementById("totalCount").textContent = totalCount;
            document.getElementById("doneCount").textContent = doneCount;
            document.getElementById("progress").textContent = progress + "%";
        }

        function saveData() {
            localStorage.setItem("gymMenu", JSON.stringify(menu));
        }

        function addMenu() {
            if (!currentCategory) {
                alert("カテゴリを選択してください");
                return;
            }

            const name = document.getElementById("name").value.trim();
            const sets = document.getElementById("sets").value;
            const reps = document.getElementById("reps").value;

            if (!name) {
                alert("種目名を入力してください");
                document.getElementById("name").focus();
                return;
            }

            if (!sets || sets <= 0) {
                alert("セット数は1以上の数値を入力してください");
                document.getElementById("sets").focus();
                return;
            }

            if (!reps || reps <= 0) {
                alert("回数は1以上の数値を入力してください");
                document.getElementById("reps").focus();
                return;
            }

            if (!menu[currentCategory]) {
                menu[currentCategory] = [];
            }

            menu[currentCategory].push({ name, sets: parseInt(sets), reps: parseInt(reps), done: false, rest: 60 });
            document.getElementById("name").value = '';
            document.getElementById("sets").value = '';
            document.getElementById("reps").value = '';
            document.getElementById("name").focus();
            render();
        }

        function deleteMenu(index) {
            const currentMenu = menu[currentCategory] || [];
            if (confirm(`「${currentMenu[index].name}」を削除しますか？`)) {
                currentMenu.splice(index, 1);
                render();
            }
        }

        function editMenu(index) {
            const currentMenu = menu[currentCategory] || [];
            const item = currentMenu[index];
            const newName = prompt("種目名を入力:", item.name);
            if (newName === null) return;

            if (!newName.trim()) {
                alert("種目名を入力してください");
                return;
            }

            const newSets = prompt("セット数を入力:", item.sets);
            if (newSets === null) return;

            if (!newSets || newSets <= 0) {
                alert("セット数は1以上の数値を入力してください");
                return;
            }

            const newReps = prompt("回数を入力:", item.reps);
            if (newReps === null) return;

            if (!newReps || newReps <= 0) {
                alert("回数は1以上の数値を入力してください");
                return;
            }

            currentMenu[index] = {
                name: newName.trim(),
                sets: parseInt(newSets),
                reps: parseInt(newReps),
                rest: item.rest || 60,
                done: item.done
            };
            render();
        }

        function editRestTime(index) {
            const currentMenu = menu[currentCategory] || [];
            const item = currentMenu[index];
            const newRest = prompt("休憩時間を入力（秒）:", item.rest || 60);
            if (newRest === null) return;

            if (!newRest || newRest <= 0) {
                alert("休憩時間は1以上の数値を入力してください");
                return;
            }

            currentMenu[index].rest = parseInt(newRest);
            render();
        }

        function toggle(index) {
            const currentMenu = menu[currentCategory] || [];
            currentMenu[index].done = !currentMenu[index].done;
            render();
        }

        function resetCurrentCategory() {
            if (confirm(`「${currentCategory}」のすべてのトレーニングメニューをリセットしますか？`)) {
                menu[currentCategory] = [];
                render();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // タイマー機能
        function openTimer(index) {
            if (timerRunning) {
                pauseTimer();
            }
            const currentMenu = menu[currentCategory] || [];
            currentTimerIndex = index;
            timerSeconds = currentMenu[index].rest || 60;
            timerTotalSeconds = timerSeconds;
            
            document.getElementById("timerWidget").classList.remove("hidden");
            document.getElementById("timerWidgetName").textContent = currentMenu[index].name;
            document.getElementById("timerWidgetInfo").textContent = `セット ${currentMenu[index].sets} × ${currentMenu[index].reps}回`;
            document.getElementById("timerCustomInput").value = timerSeconds;
            updateTimerDisplay();
            updatePresetButtons();
        }

        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            document.getElementById("timerPlayBtn").style.display = "none";
            document.getElementById("timerPauseBtn").style.display = "block";

            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();

                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerRunning = false;
                    playNotification();
                    document.getElementById("timerPlayBtn").style.display = "block";
                    document.getElementById("timerPauseBtn").style.display = "none";
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById("timerPlayBtn").style.display = "block";
            document.getElementById("timerPauseBtn").style.display = "none";
        }

        function resetTimer() {
            if (timerRunning) {
                pauseTimer();
            }
            const currentMenu = menu[currentCategory] || [];
            if (currentTimerIndex >= 0 && currentMenu[currentTimerIndex]) {
                timerSeconds = currentMenu[currentTimerIndex].rest || 60;
                timerTotalSeconds = timerSeconds;
                document.getElementById("timerCustomInput").value = timerSeconds;
                updateTimerDisplay();
                updatePresetButtons();
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timerSeconds / 60);
            const seconds = timerSeconds % 60;
            const timeStr = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            document.getElementById("timerWidgetDisplay").textContent = timeStr;

            const display = document.getElementById("timerWidgetDisplay");
            const progress = timerTotalSeconds > 0 ? (timerTotalSeconds - timerSeconds) / timerTotalSeconds * 100 : 0;
            document.getElementById("timerWidgetProgress").style.width = progress + "%";

            if (timerSeconds <= 5) {
                display.className = "timer-widget-display danger";
            } else if (timerSeconds <= 10) {
                display.className = "timer-widget-display warning";
            } else {
                display.className = "timer-widget-display";
            }
        }

        function setTimerPreset(seconds) {
            if (timerRunning) {
                pauseTimer();
            }
            
            timerSeconds = seconds;
            timerTotalSeconds = seconds;
            document.getElementById("timerCustomInput").value = seconds;
            updateTimerDisplay();
            updatePresetButtons();
            
            const currentMenu = menu[currentCategory] || [];
            if (currentTimerIndex >= 0 && currentMenu[currentTimerIndex]) {
                currentMenu[currentTimerIndex].rest = seconds;
                saveData();
            }
        }

        function applyCustomTimer() {
            const newValue = parseInt(document.getElementById("timerCustomInput").value);
            if (!newValue || newValue <= 0 || newValue > 600) {
                alert("1～600の数値を入力してください");
                return;
            }
            
            if (timerRunning) {
                pauseTimer();
            }
            
            timerSeconds = newValue;
            timerTotalSeconds = newValue;
            updateTimerDisplay();
            updatePresetButtons();
            
            const currentMenu = menu[currentCategory] || [];
            if (currentTimerIndex >= 0 && currentMenu[currentTimerIndex]) {
                currentMenu[currentTimerIndex].rest = newValue;
                saveData();
            }
        }

        function updatePresetButtons() {
            const presets = [30, 60, 90, 120];
            const buttons = document.querySelectorAll(".timer-preset-btn");
            buttons.forEach((btn, index) => {
                if (presets[index] === timerSeconds) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });
        }

        function playNotification() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 1000;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                console.log("Audio notification not available");
            }
        }

        // Enterキーでメニュー追加
        document.getElementById("name").addEventListener("keypress", function(e) {
            if (e.key === "Enter") document.getElementById("sets").focus();
        });
        document.getElementById("sets").addEventListener("keypress", function(e) {
            if (e.key === "Enter") document.getElementById("reps").focus();
        });
        document.getElementById("reps").addEventListener("keypress", function(e) {
            if (e.key === "Enter") addMenu();
        });

        document.getElementById("categoryNameInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") addCategory();
        });

        // 初期表示
        renderCategories();
        render();
    </script>
</body>
</html>
