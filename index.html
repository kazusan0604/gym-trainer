<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジムメニュー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            width: 100%;
            background-color: #667eea;
            color: white;
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 10px;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .btn-warning {
            background-color: #ffc107;
            color: #333;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 5px;
        }

        .btn-warning:hover {
            background-color: #e0a800;
        }

        .btn-reset {
            width: 100%;
            background-color: #6c757d;
            color: white;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background-color: #5a6268;
        }

        .btn-timer {
            background-color: #28a745;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            position: relative;
        }

        .btn-timer:hover {
            background-color: #218838;
        }

        .btn-timer.active {
            background-color: #ff9800;
        }

        .btn-timer-edit {
            background-color: #17a2b8;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 5px;
        }

        .btn-timer-edit:hover {
            background-color: #138496;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 5px;
            background-color: #f9f9f9;
            transition: all 0.3s;
        }

        li:hover {
            border-color: #667eea;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        li.done {
            background-color: #e8f5e9;
            border-color: #4caf50;
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            margin-right: 15px;
            cursor: pointer;
            width: auto;
        }

        .menu-content {
            flex: 1;
        }

        .menu-name {
            font-weight: bold;
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .menu-details {
            color: #666;
            font-size: 14px;
        }

        .done .menu-name,
        .done .menu-details {
            text-decoration: line-through;
            color: #888;
        }

        .menu-actions {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background-color: #f0f4ff;
            border-radius: 5px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
        }

        .stat-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        /* タイマーモーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
        }

        /* タイマー表示エリア */
        .timer-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .timer-name {
            font-size: 28px;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .timer-info {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .timer-display {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            line-height: 1;
            margin: 20px 0;
        }

        .timer-display.warning {
            color: #ff9800;
            animation: pulse-warning 0.5s infinite;
        }

        .timer-display.danger {
            color: #dc3545;
            animation: pulse-danger 0.3s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes pulse-danger {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            margin: 30px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #667eea;
            transition: width 0.1s;
        }

        /* タイマー設定エリア */
        .timer-controls-section {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .timer-controls-title {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 12px;
            text-align: left;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .preset-btn {
            background-color: #e0e0e0;
            color: #333;
            padding: 10px 12px;
            font-size: 13px;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background-color: #d0d0d0;
        }

        .preset-btn.active {
            background-color: #667eea;
            color: white;
            border-color: #5568d3;
        }

        .timer-settings {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 12px;
        }

        .timer-settings input {
            flex: 1;
            padding: 8px;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }

        .timer-settings button {
            padding: 8px 15px;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* タイマーアクションボタン */
        .timer-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .timer-buttons.playing {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .timer-buttons button {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
        }

        .btn-play {
            background-color: #28a745;
            color: white;
        }

        .btn-play:hover {
            background-color: #218838;
        }

        .btn-pause {
            background-color: #ff9800;
            color: white;
        }

        .btn-pause:hover {
            background-color: #e68900;
        }

        .btn-close-modal {
            background-color: #6c757d;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-close-modal:hover {
            background-color: #5a6268;
        }

        .btn-settings-toggle {
            background-color: #17a2b8;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-settings-toggle:hover {
            background-color: #138496;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💪 トレーニング追加</h2>
        <div class="input-group">
            <input type="text" id="name" placeholder="種目名 (例: ベンチプレス)" required>
        </div>
        <div class="input-row">
            <input type="number" id="sets" placeholder="セット数" min="1" required>
            <input type="number" id="reps" placeholder="回数" min="1" required>
        </div>
        <button class="btn-primary" onclick="addMenu()">メニューに追加</button>

        <h2>📋 本日のメニュー</h2>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">全体</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">完了</div>
                <div class="stat-value" id="doneCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">進捗</div>
                <div class="stat-value" id="progress">0%</div>
            </div>
        </div>
        <ul id="menuList"></ul>
        <button class="btn-reset" onclick="resetAll()">すべてをリセット</button>
    </div>

    <!-- タイマーモーダル -->
    <div id="timerModal" class="modal">
        <div class="modal-content">
            <!-- タイマー表示部分 -->
            <div class="timer-header">
                <div class="timer-name" id="timerName">タイマー</div>
                <div class="timer-info" id="timerInfo">セット情報</div>
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- タイマー制御エリア -->
            <div class="timer-controls-section">
                <div class="timer-controls-title">⏱️ 休憩時間設定</div>
                
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="setTimerPreset(30)">30秒</button>
                    <button class="preset-btn" onclick="setTimerPreset(60)">1分</button>
                    <button class="preset-btn" onclick="setTimerPreset(90)">1分30秒</button>
                    <button class="preset-btn" onclick="setTimerPreset(120)">2分</button>
                </div>

                <div class="timer-settings">
                    <input type="number" id="timerInput" min="1" max="600" value="60">
                    <button class="btn-warning" onclick="applyTimerSetting()">設定</button>
                </div>
            </div>

            <!-- 操作ボタン -->
            <div class="timer-buttons" id="timerButtonsContainer">
                <button class="btn-play" id="playBtn" onclick="startTimer()">開始</button>
                <button class="btn-close-modal" onclick="closeTimer()">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let menu = JSON.parse(localStorage.getItem("gymMenu")) || [];
        let timerInterval = null;
        let timerRunning = false;
        let timerSeconds = 0;
        let timerTotalSeconds = 0;
        let currentTimerIndex = -1;

        function render() {
            const list = document.getElementById("menuList");
            list.innerHTML = "";

            if (menu.length === 0) {
                list.innerHTML = '<div class="empty-message">トレーニングメニューを追加してください</div>';
                updateStats();
                return;
            }

            menu.forEach((item, index) => {
                const li = document.createElement("li");
                const isChecked = item.done ? "checked" : "";
                const doneClass = item.done ? "done" : "";

                li.className = doneClass;
                li.innerHTML = `
                    <div style="display: flex; align-items: center; flex: 1;">
                        <input type="checkbox" ${isChecked} onchange="toggle(${index})">
                        <div class="menu-content">
                            <div class="menu-name">${escapeHtml(item.name)}</div>
                            <div class="menu-details">${item.sets}セット × ${item.reps}回</div>
                        </div>
                    </div>
                    <div class="menu-actions">
                        <button class="btn-timer" onclick="openTimer(${index})">⏱ ${item.rest || 60}秒</button>
                        <button class="btn-timer-edit" onclick="editRestTime(${index})">⏱ 編集</button>
                        <button class="btn-warning" onclick="editMenu(${index})">編集</button>
                        <button class="btn-danger" onclick="deleteMenu(${index})">削除</button>
                    </div>
                `;
                list.appendChild(li);
            });

            updateStats();
            localStorage.setItem("gymMenu", JSON.stringify(menu));
        }

        function updateStats() {
            const totalCount = menu.length;
            const doneCount = menu.filter(item => item.done).length;
            const progress = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

            document.getElementById("totalCount").textContent = totalCount;
            document.getElementById("doneCount").textContent = doneCount;
            document.getElementById("progress").textContent = progress + "%";
        }

        function addMenu() {
            const name = document.getElementById("name").value.trim();
            const sets = document.getElementById("sets").value;
            const reps = document.getElementById("reps").value;

            if (!name) {
                alert("種目名を入力してください");
                document.getElementById("name").focus();
                return;
            }

            if (!sets || sets <= 0) {
                alert("セット数は1以上の数値を入力してください");
                document.getElementById("sets").focus();
                return;
            }

            if (!reps || reps <= 0) {
                alert("回数は1以上の数値を入力してください");
                document.getElementById("reps").focus();
                return;
            }

            menu.push({ name, sets: parseInt(sets), reps: parseInt(reps), done: false, rest: 60 });
            document.getElementById("name").value = '';
            document.getElementById("sets").value = '';
            document.getElementById("reps").value = '';
            document.getElementById("name").focus();
            render();
        }

        function deleteMenu(index) {
            if (confirm(`「${menu[index].name}」を削除しますか？`)) {
                menu.splice(index, 1);
                render();
            }
        }

        function editMenu(index) {
            const item = menu[index];
            const newName = prompt("種目名を入力:", item.name);
            if (newName === null) return;

            if (!newName.trim()) {
                alert("種目名を入力してください");
                return;
            }

            const newSets = prompt("セット数を入力:", item.sets);
            if (newSets === null) return;

            if (!newSets || newSets <= 0) {
                alert("セット数は1以上の数値を入力してください");
                return;
            }

            const newReps = prompt("回数を入力:", item.reps);
            if (newReps === null) return;

            if (!newReps || newReps <= 0) {
                alert("回数は1以上の数値を入力してください");
                return;
            }

            menu[index] = {
                name: newName.trim(),
                sets: parseInt(newSets),
                reps: parseInt(newReps),
                rest: item.rest || 60,
                done: item.done
            };
            render();
        }

        function editRestTime(index) {
            const item = menu[index];
            const newRest = prompt("休憩時間を入力（秒）:", item.rest || 60);
            if (newRest === null) return;

            if (!newRest || newRest <= 0) {
                alert("休憩時間は1以上の数値を入力してください");
                return;
            }

            menu[index].rest = parseInt(newRest);
            render();
        }

        function toggle(index) {
            menu[index].done = !menu[index].done;
            render();
        }

        function resetAll() {
            if (confirm("すべてのトレーニングメニューを削除しますか？\n\nこの操作は取り消せません。")) {
                menu = [];
                render();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // タイマー機能
        function openTimer(index) {
            if (timerRunning) {
                pauseTimer();
            }
            currentTimerIndex = index;
            timerSeconds = menu[index].rest || 60;
            timerTotalSeconds = timerSeconds;
            
            document.getElementById("timerName").textContent = menu[index].name;
            document.getElementById("timerInfo").textContent = `セット ${menu[index].sets} × ${menu[index].reps}回`;
            document.getElementById("timerInput").value = timerSeconds;
            document.getElementById("timerModal").classList.add("active");
            updateTimerDisplay();
            updatePresetButtons();
            resetButtonLayout();
        }

        function closeTimer() {
            if (timerRunning) {
                pauseTimer();
            }
            document.getElementById("timerModal").classList.remove("active");
            currentTimerIndex = -1;
        }

        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            updateButtonLayout();

            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();

                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerRunning = false;
                    playNotification();
                    resetButtonLayout();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            resetButtonLayout();
        }

        function updateButtonLayout() {
            const container = document.getElementById("timerButtonsContainer");
            if (timerRunning) {
                container.classList.add("playing");
                document.getElementById("playBtn").style.display = "none";
                document.getElementById("pauseBtn").style.display = "block";
            }
        }

        function resetButtonLayout() {
            const container = document.getElementById("timerButtonsContainer");
            container.classList.remove("playing");
            document.getElementById("playBtn").style.display = "block";
            document.getElementById("pauseBtn").style.display = "none";
        }

        function createPauseButton() {
            if (!document.getElementById("pauseBtn")) {
                const btn = document.createElement("button");
                btn.id = "pauseBtn";
                btn.className = "btn-pause";
                btn.textContent = "一時停止";
                btn.onclick = pauseTimer;
                btn.style.display = "none";
                document.getElementById("timerButtonsContainer").insertBefore(btn, document.getElementById("timerButtonsContainer").firstChild.nextSibling);
            }
        }

        createPauseButton();

        function updateTimerDisplay() {
            const minutes = Math.floor(timerSeconds / 60);
            const seconds = timerSeconds % 60;
            const timeStr = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            document.getElementById("timerDisplay").textContent = timeStr;

            // 色変更とアニメーション
            const display = document.getElementById("timerDisplay");
            const progress = (timerTotalSeconds - timerSeconds) / timerTotalSeconds * 100;
            document.getElementById("progressFill").style.width = progress + "%";

            if (timerSeconds <= 5) {
                display.className = "timer-display danger";
            } else if (timerSeconds <= 10) {
                display.className = "timer-display warning";
            } else {
                display.className = "timer-display";
            }
        }

        function applyTimerSetting() {
            const newValue = parseInt(document.getElementById("timerInput").value);
            if (!newValue || newValue <= 0) {
                alert("1以上の数値を入力してください");
                return;
            }
            
            if (timerRunning) {
                pauseTimer();
            }
            
            timerSeconds = newValue;
            timerTotalSeconds = newValue;
            updateTimerDisplay();
            updatePresetButtons();
            
            // メニューにも反映
            if (currentTimerIndex >= 0) {
                menu[currentTimerIndex].rest = newValue;
                localStorage.setItem("gymMenu", JSON.stringify(menu));
            }
        }

        function setTimerPreset(seconds) {
            if (timerRunning) {
                pauseTimer();
            }
            
            timerSeconds = seconds;
            timerTotalSeconds = seconds;
            document.getElementById("timerInput").value = seconds;
            updateTimerDisplay();
            updatePresetButtons();
            
            // メニューにも反映
            if (currentTimerIndex >= 0) {
                menu[currentTimerIndex].rest = seconds;
                localStorage.setItem("gymMenu", JSON.stringify(menu));
            }
        }

        function updatePresetButtons() {
            const presets = [30, 60, 90, 120];
            const buttons = document.querySelectorAll(".preset-btn");
            buttons.forEach((btn, index) => {
                if (presets[index] === timerSeconds) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });
        }

        function playNotification() {
            // ブラウザの通知音（Web Audio API）
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 1000;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Enterキーでメニュー追加
        document.getElementById("name").addEventListener("keypress", function(e) {
            if (e.key === "Enter") document.getElementById("sets").focus();
        });
        document.getElementById("sets").addEventListener("keypress", function(e) {
            if (e.key === "Enter") document.getElementById("reps").focus();
        });
        document.getElementById("reps").addEventListener("keypress", function(e) {
            if (e.key === "Enter") addMenu();
        });

        // 初期表示
        render();
    </script>
</body>
</html>
